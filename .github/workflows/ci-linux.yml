name: ci-linux

on: [pull_request, workflow_dispatch]

env:
  BUILD_DIR: ${{ github.workspace }}/build

jobs:
  ci-linux-gcc-13:
    strategy:
      matrix:
        shared: ["False", "True"]
        openssl: ["False", "True"]

    name: ci-linux-g++-13-release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Conan packages
        uses: actions/cache@v4
        env:
          cache-name: cache-conan-packages
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Conan
        run: python -m pip install -r .github/requirements.txt

      - name: Detect Conan profile
        run: conan profile detect --force --name=gcc-13

      - name: Install Conan Dependencies
        run: conan install . -o beauty/*:shared=${{ matrix.shared }} -o beauty/*:openssl=${{ matrix.openssl }} -of $BUILD_DIR -pr:b gcc-13 -pr:h gcc-13 --build=missing

      - name: Build
        run: |
          cmake -S . -B $BUILD_DIR --preset conan-release          
          cmake --build $BUILD_DIR --preset conan-release

      - name: Test
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --output-on-failure

  ci-linux-gcc-13-distribution-boost:
    name: ci-linux-g++-13-distribution-boost-static-release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Boost libraries
        run: sudo apt-get install -y libboost-all-dev

      - name: Build
        run: |
          cmake -S . -B $BUILD_DIR -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS:BOOL=OFF
          cmake --build $BUILD_DIR

      - name: Test
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --output-on-failure

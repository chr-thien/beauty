name: ci-windows

on: [pull_request, workflow_dispatch]

jobs:
  ci-windows-msvc-19:
    strategy:
      matrix:
        shared: ["False", "True"]
        openssl: ["False", "True"]

    name: ci-windows-msvc-19-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Visual Studio Environment
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Configure Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Conan packages
        uses: actions/cache@v4
        env:
          cache-name: cache-conan-packages
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Conan
        run: python -m pip install -r .github/requirements.txt

      - name: Detect Conan profile
        run: conan profile detect --force --name=msvc-19

      - name: Install Conan Dependencies
        run: |
          conan install . -o *:shared=${{ matrix.shared }} -o beauty/*:openssl=${{ matrix.openssl }} -of ${{ github.workspace }}/build -pr:b msvc-19 -pr:h msvc-19 -s compiler.cppstd=17 --build=missing

      - name: Build
        run: |
          cmake -S . -B ${{ github.workspace }}/build --preset conan-default
          cmake --build ${{ github.workspace }}/build --preset conan-release
